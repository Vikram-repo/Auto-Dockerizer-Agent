name: Run Azure Login and Docker Build

on:
  push:
    branches:
      - "master" # Aapki branch ka naam master hai

permissions:
  id-token: write  # Azure OIDC login ke liye zaroori hai
  contents: read   # Repository ka code read karne ke liye zaroori hai

jobs: 
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    
    # 1. Sabse pehle repo ka code runner machine par lana
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Azure mein OIDC ke zariye login karna
    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }} 

    # 3. ACR (Azure Container Registry) ko authenticate karna
    - name: Login to ACR
      run: |
        az acr login --name ${{ secrets.AZURE_ACR_NAME }}

    # 4. Docker Image Build aur Push karna (Kyunki login ho chuka hai, ab ye chalega)
    - name: Docker Build and Push
      run: |
        docker build -t ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/docker-agent:v1 .
        docker push ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/docker-agent:v1
